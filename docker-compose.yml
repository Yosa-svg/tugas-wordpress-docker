version: "3.8"

services:
  # Konfigurasi Database MySQL
  mysql:
    image: mysql:5.7
    environment:
      MYSQL_ROOT_PASSWORD: Docker12345
      MYSQL_DATABASE: wp_db
      MYSQL_USER: yosafat
      MYSQL_PASSWORD: dipa12345
    volumes:
      - db_data:/var/lib/mysql

  # Konfigurasi Aplikasi WordPress
  wordpress:
    image: wordpress:latest
    ports:
      - "8000:80"
    environment:
      # Host menggunakan nama service database kita, yaitu 'mysql'
      WORDPRESS_DB_HOST: mysql
      # Kredensial di bawah ini HARUS SAMA dengan kredensial MySQL di atas
      WORDPRESS_DB_NAME: wp_db
      WORDPRESS_DB_USER: yosafat
      WORDPRESS_DB_PASSWORD: dipa12345
    depends_on:
      - mysql
    volumes:
      - wp_data:/var/www/html
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
  

# Mendaftarkan semua volume yang dipakai
volumes:
  db_data:
  wp_data: